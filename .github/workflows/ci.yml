name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skill-structure-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify SKILL.md exists and has valid frontmatter
        run: |
          test -f SKILL.md
          python -c "
          import re
          content = open('SKILL.md', encoding='utf-8').read()
          # 检查 YAML frontmatter
          if not content.startswith('---'):
              raise SystemExit('SKILL.md 缺少 YAML frontmatter')
          fm = content.split('---')[1]
          if 'name:' not in fm:
              raise SystemExit('SKILL.md frontmatter 缺少 name 字段')
          if 'description:' not in fm:
              raise SystemExit('SKILL.md frontmatter 缺少 description 字段')
          print('SKILL.md frontmatter 验证通过')
          "

      - name: Verify directory structure
        run: |
          for dir in prompts templates examples tests scripts assets references docs; do
            test -d "$dir" || { echo "缺少目录: $dir"; exit 1; }
          done
          echo "目录结构验证通过"

      - name: Verify prompt files (10 required)
        run: |
          count=$(ls prompts/*.md 2>/dev/null | wc -l)
          if [ "$count" -lt 10 ]; then
            echo "prompts/ 目录文件数不足: $count (需要 >= 10)"
            exit 1
          fi
          # 检查所有 prompt 文件非空
          for f in prompts/*.md; do
            if [ ! -s "$f" ]; then
              echo "prompt 文件为空: $f"
              exit 1
            fi
          done
          echo "prompt 文件验证通过 ($count 个文件)"

      - name: Verify template files (5 required)
        run: |
          count=$(ls templates/*.md 2>/dev/null | wc -l)
          if [ "$count" -lt 5 ]; then
            echo "templates/ 目录文件数不足: $count (需要 >= 5)"
            exit 1
          fi
          echo "template 文件验证通过 ($count 个文件)"

      - name: Verify at least one complete example
        run: |
          example_count=$(find examples -name "npc_design_bible_output.md" | wc -l)
          if [ "$example_count" -lt 1 ]; then
            echo "至少需要一个完整的 NPC Design Bible 示例"
            exit 1
          fi
          echo "示例验证通过 ($example_count 个完整示例)"

      - name: Validate example Bible with validate_bible.py
        run: |
          for bible in $(find examples -name "npc_design_bible_output.md"); do
            echo "验证: $bible"
            python scripts/validate_bible.py "$bible" || echo "(Example Bible 验证结束)"
          done

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint "**/*.md" \
            --config .markdownlint.json \
            --ignore "node_modules" \
            --ignore ".git" \
            || echo "(Markdown lint 完成，检查报告见上文)"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
